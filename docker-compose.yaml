# Vehicle Maintenance Service - Docker Compose
#
# This file provides local development infrastructure.
#
# Usage:
#   docker-compose up -d      # Start services in background
#   docker-compose down       # Stop services
#   docker-compose logs -f    # View logs
#
# Port Mappings (to avoid conflicts with other services):
#   - PostgreSQL: 5434 (host) -> 5432 (container)
#   - Redis: 6381 (host) -> 6379 (container)
#   - MinIO API: 9000 (host) -> 9000 (container)
#   - MinIO Console: 9001 (host) -> 9001 (container)
#
# Data Persistence:
#   Data is persisted in named volumes (postgres_data, redis_data, minio_data).
#   To reset: docker-compose down -v && docker-compose up -d

version: '3.8'

services:
  # PostgreSQL Database
  # Connection: postgresql://postgres:postgres@localhost:5434/maintenance_db
  postgres:
    image: postgres:15-alpine
    container_name: maintenance-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maintenance_db
    ports:
      # Host port 5434 to avoid conflict with default PostgreSQL
      - '5434:5432'
    volumes:
      # Named volume for data persistence across restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache (optional, for future caching needs)
  # Connection: redis://localhost:6381
  redis:
    image: redis:7-alpine
    container_name: maintenance-redis
    ports:
      # Host port 6381 to avoid conflict with default Redis
      - '6381:6379'
    volumes:
      # Named volume for data persistence
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  # Console: http://localhost:9001 (login: minioadmin / minioadmin123)
  # API: http://localhost:9000
  minio:
    image: minio/minio:latest
    container_name: maintenance-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5

# Named volumes for data persistence
volumes:
  postgres_data:
  redis_data:
  minio_data:
